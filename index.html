<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wereldklokken</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Daymakers Favourite Timezones</p>
      <h1><span>Realtime</span> <span>kantoortijden</span></h1>
    </header>

    <section class="clock-grid" aria-label="Kantoor klokken">
      <article class="clock-card clock-card--nl" data-timezone="Europe/Amsterdam" data-lat="52.0907" data-lon="5.1214">
        <img class="flag-badge" src="assets/flag-nl.svg" alt="Nederlandse vlag">
        <div class="clock-copy">
          <p class="clock-label">Daymakers Utrecht</p>
          <p class="clock-city">Utrecht, Nederland</p>
        </div>
        <p class="clock-weather" data-weather aria-live="polite"></p>
        <div class="clock-display" data-time></div>
      </article>

      <article class="clock-card clock-card--nl" data-timezone="Europe/Amsterdam" data-lat="52.9633" data-lon="5.7989">
        <img class="flag-badge flag-badge--friesland" src="assets/flag-friesland-official.svg" alt="Friese vlag">
        <div class="clock-copy">
          <p class="clock-label">MHB Joure</p>
          <p class="clock-city">Joure, Nederland</p>
        </div>
        <p class="clock-weather" data-weather aria-live="polite"></p>
        <div class="clock-display" data-time></div>
      </article>

      <article class="clock-card clock-card--us" data-timezone="America/Los_Angeles" data-lat="37.8044" data-lon="-122.2712">
        <img class="flag-badge" src="assets/flag-us.svg" alt="Amerikaanse vlag">
        <div class="clock-copy">
          <p class="clock-label">Hartmann Oakland</p>
          <p class="clock-city">Oakland, California, Verenigde Staten</p>
        </div>
        <p class="clock-weather" data-weather aria-live="polite"></p>
        <div class="clock-display" data-time></div>
      </article>

      <article class="clock-card clock-card--us" data-timezone="America/Chicago" data-lat="41.6005" data-lon="-93.6091" data-bbq-brent>
        <img class="flag-badge" src="assets/flag-us.svg" alt="Amerikaanse vlag">
        <div class="clock-copy">
          <p class="clock-label">ITA Des Moines</p>
          <p class="clock-city">Des Moines, Iowa, Verenigde Staten</p>
        </div>
        <p class="clock-weather" data-weather aria-live="polite"></p>
        <div class="clock-display" data-time></div>
      </article>

      <article class="clock-card clock-card--us" data-timezone="America/New_York" data-lat="33.7490" data-lon="-84.3880">
        <img class="flag-badge" src="assets/flag-us.svg" alt="Amerikaanse vlag">
        <div class="clock-copy">
          <p class="clock-label">Hartmann/ITA Atlanta</p>
          <p class="clock-city">Atlanta, Georgia, Verenigde Staten</p>
        </div>
        <p class="clock-weather" data-weather aria-live="polite"></p>
        <div class="clock-display" data-time></div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
